<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BRouter Demo</title>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
      :root {
        --bg: #0d0f0e;
        --panel: #141816;
        --border: #242a26;
        --text: #e8efe9;
        --text-dim: #93a197;
        --muted: #55615a;
        --accent: #bfff57;
        --accent2: #4ea1ff;
        --danger: #ff6464;
        --font-main: Inter, system-ui, sans-serif;
        --font-ui: ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-main);
      }

      body {
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      header {
        height: 52px;
        min-height: 52px;
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 0 16px;
        background: rgba(13, 15, 14, 0.96);
        border-bottom: 1px solid var(--border);
        z-index: 1000;
      }

      .logo {
        font-family: var(--font-ui);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.1em;
        color: var(--accent);
        white-space: nowrap;
      }

      .logo span {
        color: var(--text-dim);
        font-weight: 400;
      }

      .divider {
        width: 1px;
        height: 24px;
        background: var(--border);
      }

      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 8px var(--accent);
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      .status-text {
        font-family: var(--font-ui);
        font-size: 10px;
        color: var(--text-dim);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .header-right {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .profile-row {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .profile-label {
        font-family: var(--font-ui);
        font-size: 9px;
        color: var(--text-dim);
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .profile-select {
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--text);
        font-family: var(--font-ui);
        font-size: 10px;
        padding: 4px 8px;
        border-radius: 3px;
        cursor: pointer;
        outline: none;
        letter-spacing: 0.05em;
        transition: border-color 0.15s;
      }

      .profile-select:hover,
      .profile-select:focus {
        border-color: var(--accent);
      }

      .profile-select option {
        background: #1a1f1a;
      }

      .btn {
        font-family: var(--font-ui);
        font-size: 10px;
        letter-spacing: 0.08em;
        padding: 6px 14px;
        border-radius: 3px;
        cursor: pointer;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text-dim);
        transition: all 0.15s;
        text-transform: uppercase;
      }

      .btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .btn-danger:hover {
        border-color: var(--danger);
        color: var(--danger);
      }

      .btn-route {
        background: var(--accent);
        border-color: var(--accent);
        color: #0d0f0e;
        font-weight: 700;
      }

      .btn-route:hover {
        background: #c4ff60;
        border-color: #c4ff60;
        color: #0d0f0e;
      }

      .btn-route:disabled,
      .btn:disabled {
        background: var(--muted);
        border-color: var(--muted);
        color: var(--bg);
        cursor: not-allowed;
        opacity: 0.5;
      }

      .main {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      .sidebar {
        width: 240px;
        min-width: 240px;
        background: var(--panel);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .sidebar-section {
        padding: 16px;
        border-bottom: 1px solid var(--border);
      }

      .section-title {
        font-family: var(--font-ui);
        font-size: 9px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--text-dim);
        margin-bottom: 12px;
      }

      .waypoints-list {
        display: flex;
        flex-direction: column;
        gap: 4px;
        max-height: 280px;
        overflow-y: auto;
      }

      .waypoint-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 7px 10px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 3px;
        font-size: 11px;
        letter-spacing: 0.02em;
        animation: slideIn 0.15s ease;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-6px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .wp-index {
        font-family: var(--font-ui);
        font-size: 9px;
        color: var(--accent);
        min-width: 16px;
      }

      .wp-coords {
        flex: 1;
        font-family: var(--font-ui);
        font-size: 9px;
        color: var(--text-dim);
        line-height: 1.5;
      }

      .wp-remove {
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        font-size: 14px;
        line-height: 1;
        padding: 0 2px;
        transition: color 0.1s;
      }

      .wp-remove:hover {
        color: var(--danger);
      }

      .empty-hint {
        font-family: var(--font-ui);
        font-size: 9px;
        color: var(--text-dim);
        line-height: 1.7;
        letter-spacing: 0.04em;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .stat-box {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 3px;
        padding: 10px 12px;
      }

      .stat-label {
        font-family: var(--font-ui);
        font-size: 8px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--text-dim);
        margin-bottom: 4px;
      }

      .stat-value {
        font-family: var(--font-ui);
        font-size: 16px;
        color: var(--accent);
        font-weight: 700;
        line-height: 1;
      }

      .stat-unit {
        font-size: 9px;
        color: var(--text-dim);
        margin-left: 2px;
      }

      .log-area {
        flex: 1;
        overflow-y: auto;
        padding: 10px 16px;
      }

      .log-entry {
        font-family: var(--font-ui);
        font-size: 9px;
        color: var(--text-dim);
        letter-spacing: 0.04em;
        padding: 3px 0;
        border-bottom: 1px solid transparent;
        animation: fadeIn 0.2s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .log-entry.info {
        color: var(--text-dim);
      }
      .log-entry.success {
        color: var(--accent);
      }
      .log-entry.error {
        color: var(--danger);
      }
      .log-entry.warn {
        color: #ffcc44;
      }

      .log-time {
        opacity: 0.5;
        margin-right: 6px;
      }

      #map {
        flex: 1;
        background: #0a0c0a;
      }

      .loading-bar {
        position: fixed;
        top: 52px;
        left: 0;
        height: 2px;
        background: var(--accent);
        box-shadow: 0 0 10px var(--accent);
        width: 0%;
        transition:
          width 0.3s ease,
          opacity 0.3s;
        z-index: 9999;
        opacity: 0;
      }

      .loading-bar.active {
        opacity: 1;
        animation: loadingAnim 1.2s ease-in-out infinite;
      }

      @keyframes loadingAnim {
        0% {
          width: 0%;
          left: 0;
        }
        50% {
          width: 70%;
          left: 0;
        }
        100% {
          width: 0%;
          left: 100%;
        }
      }

      .leaflet-container {
        background: #0a0c0a;
        font-family: var(--font-main);
      }

      .leaflet-control-zoom a {
        background: var(--panel) !important;
        color: var(--text) !important;
        border-color: var(--border) !important;
      }

      .leaflet-control-zoom a:hover {
        background: var(--border) !important;
        color: var(--accent) !important;
      }

      .leaflet-popup-content-wrapper {
        background: var(--panel);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 4px;
        font-family: var(--font-ui);
        font-size: 10px;
      }

      .leaflet-popup-tip {
        background: var(--panel);
      }

      .wp-pin {
        width: 28px;
        height: 28px;
        background: var(--accent);
        border: 2px solid var(--bg);
        border-radius: 50% 50% 50% 0;
        transform: rotate(-45deg);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
      }

      .wp-pin.dest {
        background: var(--accent2);
      }

      .wp-pin-num {
        transform: rotate(45deg);
        font-family: var(--font-ui);
        font-size: 9px;
        font-weight: 700;
        color: var(--bg);
        line-height: 1;
      }

      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--muted);
      }

      @media (max-width: 900px) {
        .main {
          flex-direction: column;
        }

        .sidebar {
          width: 100%;
          min-width: 100%;
          max-height: 45vh;
          border-right: none;
          border-bottom: 1px solid var(--border);
        }
      }
    </style>
  </head>
  <body>
    <div class="loading-bar" id="loadingBar"></div>

    <header>
      <div class="logo">BR<span>outer</span> ▸ <span>DEMO</span></div>
      <div class="divider"></div>
      <div
        class="status-dot"
        id="statusDot"
        style="background: var(--text-dim); box-shadow: none"
      ></div>
      <div class="status-text" id="statusText">connecting…</div>

      <div class="header-right">
        <div class="profile-row">
          <span class="profile-label">Profile</span>
          <select class="profile-select" id="profile">
            <option value="trekking">trekking</option>
            <option value="hiking-mountain">hiking-mountain</option>
            <option value="mtb">mtb</option>
            <option value="fastbike">fastbike</option>
            <option value="shortest">shortest</option>
            <option value="car-fast">car-fast</option>
          </select>
        </div>

        <div class="divider"></div>

        <button class="btn btn-route" id="routeBtn" disabled>
          Calculate Route
        </button>
        <button class="btn" id="downloadGpxBtn" disabled>Download GPX</button>
        <button class="btn btn-danger" id="clearBtn">Clear All</button>
      </div>
    </header>

    <div class="main">
      <div class="sidebar">
        <div class="sidebar-section">
          <div class="section-title">Waypoints</div>
          <div class="waypoints-list" id="waypointList">
            <div class="empty-hint" id="emptyHint">
              Click anywhere on the map<br />to drop a waypoint.<br /><br />
              Add 2+ points, then hit<br />Calculate Route.
            </div>
          </div>
        </div>

        <div class="sidebar-section">
          <div class="section-title">Route Stats</div>
          <div class="stats-grid">
            <div class="stat-box">
              <div class="stat-label">Distance</div>
              <div class="stat-value" id="statDist">
                —<span class="stat-unit"></span>
              </div>
            </div>
            <div class="stat-box">
              <div class="stat-label">Ascent</div>
              <div class="stat-value" id="statAsc">
                —<span class="stat-unit"></span>
              </div>
            </div>
            <div class="stat-box">
              <div class="stat-label">Descent</div>
              <div class="stat-value" id="statDesc">
                —<span class="stat-unit"></span>
              </div>
            </div>
            <div class="stat-box">
              <div class="stat-label">Segments</div>
              <div class="stat-value" id="statSegs">—</div>
            </div>
          </div>
        </div>

        <div class="log-area" id="logArea">
          <div class="section-title" style="margin-bottom: 8px">Log</div>
        </div>
      </div>

      <div id="map"></div>
    </div>

    <script>
      const BROUTER = "http://localhost:17777/brouter";
      const BROUTER_ROOT = "http://localhost:17777/";
      const waypoints = [];
      let routeLayer = null;
      let markers = [];
      let lastRouteGeojson = null;

      const map = L.map("map", {
        center: [34.05, -118.25],
        zoom: 12,
        zoomControl: true,
      });

      L.tileLayer(
        "https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png",
        {
          attribution: "&copy; OpenStreetMap & CARTO",
          subdomains: "abcd",
          maxZoom: 19,
        },
      ).addTo(map);

      L.tileLayer(
        "https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png",
        {
          attribution: "",
          subdomains: "abcd",
          pane: "overlayPane",
        },
      ).addTo(map);

      function log(msg, type = "info") {
        const area = document.getElementById("logArea");
        const t = new Date().toTimeString().slice(0, 8);
        const div = document.createElement("div");
        div.className = `log-entry ${type}`;
        div.innerHTML = `<span class="log-time">${t}</span>${msg}`;
        area.appendChild(div);
        area.scrollTop = area.scrollHeight;
      }

      async function checkServer() {
        try {
          await fetch(BROUTER_ROOT, { signal: AbortSignal.timeout(2000) });
          setStatus(true);
          log("BRouter server reachable ✓", "success");
        } catch (e) {
          setStatus(false);
          log("Cannot reach localhost:17777 — start BRouter first", "error");
        }
      }

      function setStatus(online) {
        const dot = document.getElementById("statusDot");
        const txt = document.getElementById("statusText");

        if (online) {
          dot.style.background = "var(--accent)";
          dot.style.boxShadow = "0 0 8px var(--accent)";
          txt.textContent = "brouter online";
        } else {
          dot.style.background = "var(--danger)";
          dot.style.boxShadow = "0 0 8px var(--danger)";
          txt.textContent = "brouter offline";
        }
      }

      function makeIcon(index, isLast) {
        const cls = isLast ? "wp-pin dest" : "wp-pin";
        return L.divIcon({
          html: `<div class="${cls}"><span class="wp-pin-num">${index + 1}</span></div>`,
          className: "",
          iconSize: [28, 28],
          iconAnchor: [10, 28],
          popupAnchor: [4, -28],
        });
      }

      function addWaypoint(latlng) {
        waypoints.push(latlng);
        refreshMarkers();
        refreshList();
        updateButtons();
        log(
          `Waypoint ${waypoints.length} → ${latlng.lat.toFixed(5)}, ${latlng.lng.toFixed(5)}`,
        );
      }

      function removeWaypoint(idx) {
        waypoints.splice(idx, 1);
        refreshMarkers();
        refreshList();
        clearRouteLayer();
        resetStats();
        lastRouteGeojson = null;
        updateButtons();
        log(`Waypoint ${idx + 1} removed`);
      }

      function refreshMarkers() {
        markers.forEach((m) => map.removeLayer(m));
        markers = [];

        waypoints.forEach((latlng, i) => {
          const isLast = i === waypoints.length - 1;
          const marker = L.marker(latlng, {
            icon: makeIcon(i, isLast),
            draggable: true,
          })
            .addTo(map)
            .bindPopup(
              `<b>WP ${i + 1}</b><br>${latlng.lat.toFixed(5)}<br>${latlng.lng.toFixed(5)}`,
            );

          marker.on("dragend", (e) => {
            waypoints[i] = e.target.getLatLng();
            refreshList();
            clearRouteLayer();
            resetStats();
            lastRouteGeojson = null;
            updateButtons();
            log(`Waypoint ${i + 1} moved`);
          });

          markers.push(marker);
        });
      }

      function refreshList() {
        const list = document.getElementById("waypointList");
        const hint = document.getElementById("emptyHint");
        list.innerHTML = "";

        if (waypoints.length === 0) {
          hint.style.display = "";
          list.appendChild(hint);
          return;
        }

        waypoints.forEach((wp, i) => {
          const row = document.createElement("div");
          row.className = "waypoint-item";
          row.innerHTML = `
        <span class="wp-index">WP${i + 1}</span>
        <span class="wp-coords">${wp.lat.toFixed(4)}<br>${wp.lng.toFixed(4)}</span>
        <button class="wp-remove" title="Remove">×</button>
      `;
          row.querySelector(".wp-remove").onclick = () => removeWaypoint(i);
          list.appendChild(row);
        });
      }

      function updateButtons() {
        const canRoute = waypoints.length >= 2;
        document.getElementById("routeBtn").disabled = !canRoute;
        document.getElementById("downloadGpxBtn").disabled = !canRoute;
      }

      function clearRouteLayer() {
        if (routeLayer) {
          map.removeLayer(routeLayer);
          routeLayer = null;
        }
      }

      function resetStats() {
        document.getElementById("statDist").innerHTML = "—";
        document.getElementById("statAsc").innerHTML = "—";
        document.getElementById("statDesc").innerHTML = "—";
        document.getElementById("statSegs").innerHTML = "—";
      }

      function setLoading(on) {
        document.getElementById("loadingBar").className = on
          ? "loading-bar active"
          : "loading-bar";

        document.getElementById("routeBtn").disabled =
          on || waypoints.length < 2;
        document.getElementById("downloadGpxBtn").disabled =
          on || waypoints.length < 2;
      }

      function buildLonlats() {
        return waypoints
          .map((w) => `${w.lng.toFixed(6)},${w.lat.toFixed(6)}`)
          .join("|");
      }

      function buildRouteUrl(format) {
        const profile = document.getElementById("profile").value;
        const lonlats = buildLonlats();
        return `${BROUTER}?lonlats=${encodeURIComponent(lonlats)}&profile=${encodeURIComponent(profile)}&format=${encodeURIComponent(format)}`;
      }

      map.on("click", (e) => addWaypoint(e.latlng));

      document.getElementById("routeBtn").onclick = calculateRoute;
      document.getElementById("downloadGpxBtn").onclick = downloadRouteGpx;
      document.getElementById("clearBtn").onclick = clearAll;

      async function calculateRoute() {
        if (waypoints.length < 2) return;

        const profile = document.getElementById("profile").value;
        const url = buildRouteUrl("geojson");

        log(`Routing [${profile}] ${waypoints.length} pts…`, "info");
        setLoading(true);

        try {
          const res = await fetch(url);
          if (!res.ok) {
            const txt = await res.text();
            throw new Error(`HTTP ${res.status}: ${txt.slice(0, 120)}`);
          }

          const geojson = await res.json();
          drawRoute(geojson);
          lastRouteGeojson = geojson;
          setStatus(true);
          log("Route received ✓", "success");
        } catch (e) {
          log(`Error: ${e.message}`, "error");
          console.error(e);
          setStatus(false);
        } finally {
          setLoading(false);
        }
      }

      function drawRoute(geojson) {
        clearRouteLayer();

        const features = geojson.features || [];
        if (!features.length) {
          log("No route features returned", "warn");
          return;
        }

        const feature = features[0];
        const coords = feature.geometry?.coordinates || [];
        if (!coords.length) {
          log("Route geometry is empty", "warn");
          return;
        }

        const latlngs = coords.map((c) => [c[1], c[0]]);

        routeLayer = L.layerGroup([
          L.polyline(latlngs, {
            color: "#a8ff3e",
            weight: 10,
            opacity: 0.18,
          }),
          L.polyline(latlngs, {
            color: "#0066ff",
            weight: 3.5,
            opacity: 1,
          }),
        ]).addTo(map);

        map.fitBounds(L.latLngBounds(latlngs).pad(0.08));

        const props = feature.properties || {};
        const dist = props["track-length"];
        const asc = props["filtered ascend"] ?? props["total-ascend"];
        const desc = props["filtered descend"] ?? props["total-descend"];

        document.getElementById("statDist").innerHTML =
          dist != null
            ? `${(dist / 1000).toFixed(2)}<span class="stat-unit">km</span>`
            : "—";

        document.getElementById("statAsc").innerHTML =
          asc != null
            ? `${Math.round(asc)}<span class="stat-unit">m</span>`
            : "—";

        document.getElementById("statDesc").innerHTML =
          desc != null
            ? `${Math.round(desc)}<span class="stat-unit">m</span>`
            : "—";

        document.getElementById("statSegs").innerHTML = coords.length;

        log(
          `↔ ${dist ? (dist / 1000).toFixed(2) + "km" : "?"}  ↑${asc ?? "?"}m  ↓${desc ?? "?"}m  pts:${coords.length}`,
          "success",
        );
      }

      async function downloadRouteGpx() {
        if (waypoints.length < 2) return;

        const profile = document.getElementById("profile").value;
        const url = buildRouteUrl("gpx");

        log(`Downloading GPX [${profile}]…`, "info");
        setLoading(true);

        try {
          const res = await fetch(url);
          if (!res.ok) {
            const txt = await res.text();
            throw new Error(`HTTP ${res.status}: ${txt.slice(0, 120)}`);
          }

          const gpxText = await res.text();

          if (!gpxText || !gpxText.trim().startsWith("<?xml")) {
            throw new Error("BRouter did not return valid GPX");
          }

          const timestamp = new Date().toISOString().replace(/[:.]/g, "-");
          const filename = `brouter-route-${profile}-${timestamp}.gpx`;

          const blob = new Blob([gpxText], {
            type: "application/gpx+xml;charset=utf-8",
          });

          const blobUrl = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = blobUrl;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(blobUrl);

          setStatus(true);
          log(`GPX downloaded ✓ ${filename}`, "success");
        } catch (e) {
          console.error(e);
          log(`GPX download failed: ${e.message}`, "error");
          setStatus(false);
        } finally {
          setLoading(false);
        }
      }

      function clearAll() {
        waypoints.length = 0;
        refreshMarkers();
        refreshList();
        clearRouteLayer();
        resetStats();
        lastRouteGeojson = null;
        updateButtons();
        log("Cleared", "warn");
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") calculateRoute();
        if (e.key === "Escape") clearAll();

        if ((e.key === "z" || e.key === "Z") && (e.metaKey || e.ctrlKey)) {
          if (waypoints.length) {
            removeWaypoint(waypoints.length - 1);
          }
        }
      });

      log("Open in browser from disk — ensure BRouter is running");
      log(
        "Click map to add waypoints • Enter to route • Esc to clear • Ctrl/Cmd+Z undo",
      );
      log("Use Download GPX after adding 2+ waypoints");
      checkServer();
      updateButtons();
    </script>
  </body>
</html>
